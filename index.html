<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edu Assist – India's New-Gen College Guide & Mock Interview Coach</title>
  <meta name="description" content="Edu Assist helps students explore new-generation colleges in India and practice mock interviews with AI-powered coaching powered by Google Gemini." />
  <style>
    /* ===== DESIGN TOKENS ===== */
    :root {
      --primary: #6c63ff;
      --primary-dark: #4d44d4;
      --primary-glow: rgba(108,99,255,0.25);
      --secondary: #00d2ff;
      --accent: #ff6584;
      --bg-base: #0f0f1a;
      --bg-card: #1a1a2e;
      --bg-card2: #16213e;
      --bg-input: #1e1e35;
      --border: rgba(108,99,255,0.25);
      --text-primary: #e8e8ff;
      --text-secondary: #9090b8;
      --text-muted: #5a5a80;
      --bot-bubble: #1e2048;
      --user-bubble: linear-gradient(135deg, #6c63ff, #4d44d4);
      --success: #00e676;
      --warning: #ffab40;
      --error: #ff5252;
      --radius: 18px;
      --radius-sm: 10px;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
      --shadow-glow: 0 0 30px rgba(108,99,255,0.2);
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg-base);
      color: var(--text-primary);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* ===== ANIMATED BACKGROUND ===== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(108,99,255,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 90%, rgba(0,210,255,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    /* ===== API KEY MODAL ===== */
    #api-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(12px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    #api-modal.open { display: flex; }
    .modal-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 36px;
      max-width: 460px;
      width: 100%;
      box-shadow: var(--shadow), var(--shadow-glow);
      animation: slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes slideUp {
      from { transform: translateY(40px) scale(0.95); opacity: 0; }
      to   { transform: translateY(0) scale(1); opacity: 1; }
    }
    .modal-logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .modal-logo .logo-icon {
      font-size: 52px;
      display: block;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 16px var(--primary));
    }
    .modal-logo h1 {
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .modal-logo p {
      color: var(--text-secondary);
      font-size: 13px;
      margin-top: 4px;
    }
    .modal-box label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .modal-box input[type="password"],
    .modal-box input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: var(--transition);
    }
    .modal-box input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    .modal-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
      line-height: 1.5;
    }
    .modal-hint a { color: var(--secondary); text-decoration: none; }
    .modal-hint a:hover { text-decoration: underline; }
    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition);
      letter-spacing: 0.03em;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(108,99,255,0.45);
    }
    .btn-primary:active { transform: translateY(0); }
    /* ===== HEADER ===== */
    #app-header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: rgba(26,26,46,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand-icon { font-size: 28px; filter: drop-shadow(0 0 8px var(--primary)); }
    .brand-text {
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .header-actions { display: flex; align-items: center; gap: 10px; }
    .btn-icon {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 7px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .btn-icon:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-glow);
    }
    /* ===== MODE TABS ===== */
    #mode-tabs {
      position: relative;
      z-index: 10;
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      background: rgba(15,15,26,0.95);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 16px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .tab-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      opacity: 0;
      transition: opacity 0.3s;
    }
    .tab-btn.active {
      border-color: var(--primary);
      color: #fff;
    }
    .tab-btn.active::before { opacity: 1; }
    .tab-btn span { position: relative; z-index: 1; }
    .tab-btn .tab-emoji { font-size: 18px; position: relative; z-index: 1; }
    .tab-btn:hover:not(.active) {
      border-color: var(--primary);
      color: var(--text-primary);
      background: var(--primary-glow);
    }
    /* ===== INTERVIEW PROGRESS ===== */
    #interview-progress {
      display: none;
      position: relative;
      z-index: 10;
      padding: 10px 20px;
      background: rgba(26,26,46,0.8);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #interview-progress.visible { display: block; }
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .progress-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .progress-count {
      font-size: 12px;
      font-weight: 700;
      color: var(--primary);
    }
    .progress-bar-track {
      width: 100%;
      height: 6px;
      background: rgba(108,99,255,0.15);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 999px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 0 8px var(--primary);
    }
    .progress-dots {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      justify-content: center;
    }
    .progress-dot {
      width: 28px;
      height: 6px;
      border-radius: 999px;
      background: rgba(108,99,255,0.2);
      transition: var(--transition);
    }
    .progress-dot.done { background: var(--primary); }
    .progress-dot.current { background: linear-gradient(90deg, var(--primary), var(--secondary)); box-shadow: 0 0 8px var(--primary); }
    /* ===== CHAT AREA ===== */
    #chat-wrapper {
      flex: 1;
      overflow: hidden;
      position: relative;
      z-index: 5;
    }
    #chat-messages {
      height: 100%;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    /* ===== WELCOME BANNER ===== */
    .welcome-banner {
      background: linear-gradient(135deg, rgba(108,99,255,0.1), rgba(0,210,255,0.05));
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      animation: fadeInUp 0.5s ease;
    }
    .welcome-banner h2 {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .welcome-banner p {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .college-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: center;
    }
    .chip {
      background: rgba(108,99,255,0.12);
      border: 1px solid rgba(108,99,255,0.25);
      color: var(--text-secondary);
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 11.5px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }
    .chip:hover {
      background: rgba(108,99,255,0.25);
      color: var(--text-primary);
      border-color: var(--primary);
      transform: translateY(-1px);
    }
    /* ===== MESSAGE BUBBLES ===== */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      animation: fadeInUp 0.35s ease;
    }
    .msg-row.user { flex-direction: row-reverse; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      border: 2px solid var(--border);
    }
    .avatar.bot {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-color: var(--primary);
    }
    .avatar.user-av {
      background: linear-gradient(135deg, #ff6584, #ff8e53);
      border-color: #ff6584;
    }
    .bubble {
      max-width: min(75%, 520px);
      padding: 13px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
    }
    .bubble.bot {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text-primary);
    }
    .bubble.bot strong { color: var(--secondary); }
    .bubble.user {
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
      color: #fff;
      box-shadow: 0 4px 16px rgba(108,99,255,0.3);
    }
    .msg-meta {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 5px;
      text-align: right;
    }
    .msg-row.user .msg-meta { text-align: left; }
    /* Score card */
    .score-card {
      background: linear-gradient(135deg, rgba(108,99,255,0.15), rgba(0,210,255,0.08));
      border: 1px solid var(--primary);
      border-radius: 16px;
      padding: 18px;
      margin-top: 10px;
    }
    .score-number {
      font-size: 42px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      display: block;
    }
    .score-label { text-align: center; font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .score-breakdown { margin-top: 14px; display: flex; flex-direction: column; gap: 6px; }
    .score-row { display: flex; justify-content: space-between; font-size: 13px; }
    .score-row .s-key { color: var(--text-secondary); }
    .score-row .s-val { font-weight: 700; color: var(--text-primary); }
    /* feedback badges */
    .feedback-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .badge {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11.5px;
      font-weight: 600;
    }
    .badge.strength { background: rgba(0,230,118,0.15); color: var(--success); border: 1px solid rgba(0,230,118,0.3); }
    .badge.improve  { background: rgba(255,171,64,0.15); color: var(--warning); border: 1px solid rgba(255,171,64,0.3); }
    /* typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeInUp 0.35s ease;
    }
    .typing-bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 13px 18px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--primary);
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
      30% { transform: translateY(-8px); opacity: 1; }
    }
    .typing-text { font-size: 12px; color: var(--text-muted); }
    /* ===== INPUT AREA ===== */
    #input-area {
      position: relative;
      z-index: 10;
      padding: 12px 16px 16px;
      background: rgba(15,15,26,0.97);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 6px 6px 6px 16px;
      transition: var(--transition);
    }
    .input-row:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 14px;
      font-family: var(--font);
      resize: none;
      max-height: 120px;
      line-height: 1.6;
      padding: 7px 0;
    }
    #user-input::placeholder { color: var(--text-muted); }
    #send-btn {
      width: 42px;
      height: 42px;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }
    #send-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 20px rgba(108,99,255,0.45);
    }
    #send-btn:active { transform: scale(0.96); }
    #send-btn:disabled {
      opacity: 0.5;
      transform: none;
      box-shadow: none;
      cursor: not-allowed;
    }
    .input-footer {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-muted);
      gap: 4px;
    }
    .input-footer span.dot { opacity: 0.4; }
    /* ===== INTERVIEW WELCOME ===== */
    .interview-banner {
      background: linear-gradient(135deg, rgba(108,99,255,0.1), rgba(255,101,132,0.05));
      border: 1px solid rgba(108,99,255,0.3);
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      animation: fadeInUp 0.5s ease;
    }
    .interview-banner .ib-icon { font-size: 48px; margin-bottom: 10px; display: block; }
    .interview-banner h2 {
      font-size: 20px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .interview-banner p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 16px; }
    .start-interview-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
    }
    .start-interview-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(108,99,255,0.45);
    }
    .interview-rules {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
      text-align: left;
    }
    .rule-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12.5px;
      color: var(--text-secondary);
    }
    .rule-icon { font-size: 16px; flex-shrink: 0; }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      #app-header { padding: 10px 14px; }
      .brand-text { font-size: 17px; }
      #mode-tabs { padding: 10px 12px; gap: 6px; }
      .tab-btn { font-size: 12px; padding: 10px 10px; }
      #chat-messages { padding: 14px 10px; }
      .bubble { font-size: 13px; }
      #input-area { padding: 10px 12px 14px; }
    }
  </style>
</head>
<body>
<!-- ===== API KEY MODAL ===== -->
<div id="api-modal" class="open" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal-box">
    <div class="modal-logo">
      <span class="logo-icon">🎓</span>
      <h1 id="modal-title">Edu Assist</h1>
      <p>Your AI guide to new-gen colleges in India</p>
    </div>
    <label for="api-key-input">Google Gemini API Key</label>
    <input type="password" id="api-key-input" placeholder="AIza..." autocomplete="off" spellcheck="false" />
    <p class="modal-hint">
      Your key is stored only in this browser's localStorage. 
      Get a free key at <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">Google AI Studio</a>.
    </p>
    <button class="btn-primary" id="save-key-btn">
      <span>🚀</span> Launch Edu Assist
    </button>
  </div>
</div>
<!-- ===== APP HEADER ===== -->
<header id="app-header">
  <div class="header-brand">
    <span class="brand-icon">🎓</span>
    <span class="brand-text">Edu Assist</span>
  </div>
  <div class="header-actions">
    <button class="btn-icon" id="reset-key-btn" title="Reset API Key">🔑 Reset Key</button>
  </div>
</header>
<!-- ===== MODE TABS ===== -->
<div id="mode-tabs">
  <button class="tab-btn active" id="tab-assistant" data-mode="assistant">
    <span class="tab-emoji">🏫</span>
    <span>College Assistant</span>
  </button>
  <button class="tab-btn" id="tab-interview" data-mode="interview">
    <span class="tab-emoji">🎤</span>
    <span>Mock Interview</span>
  </button>
</div>
<!-- ===== INTERVIEW PROGRESS ===== -->
<div id="interview-progress">
  <div class="progress-header">
    <span class="progress-label">Interview Progress</span>
    <span class="progress-count" id="q-count">Question 1 of 3</span>
  </div>
  <div class="progress-bar-track">
    <div class="progress-bar-fill" id="progress-fill" style="width: 0%"></div>
  </div>
  <div class="progress-dots">
    <div class="progress-dot" id="dot-1"></div>
    <div class="progress-dot" id="dot-2"></div>
    <div class="progress-dot" id="dot-3"></div>
  </div>
</div>
<!-- ===== CHAT MESSAGES ===== -->
<div id="chat-wrapper">
  <div id="chat-messages" role="log" aria-live="polite" aria-label="Chat messages"></div>
</div>
<!-- ===== INPUT AREA ===== -->
<div id="input-area">

const COLLEGE_JSON = JSON.stringify(collegeData, null, 2);
/* ============================================================
   STATE
   ============================================================ */
let GEMINI_API_KEY = null;
let currentMode = 'assistant';   // 'assistant' | 'interview'
let interviewState = {
  active: false,
  questionIndex: 0,    // 0-based
  questions: [],
  answers: [],
  scores: []
};
let isWaiting = false;
/* ============================================================
   DOM REFS
   ============================================================ */
const $modal      = document.getElementById('api-modal');
const $apiInput   = document.getElementById('api-key-input');
const $saveKeyBtn = document.getElementById('save-key-btn');
const $resetKeyBtn= document.getElementById('reset-key-btn');
const $tabAssist  = document.getElementById('tab-assistant');
const $tabIntvw   = document.getElementById('tab-interview');
const $messages   = document.getElementById('chat-messages');
const $userInput  = document.getElementById('user-input');
const $sendBtn    = document.getElementById('send-btn');
const $progress   = document.getElementById('interview-progress');
const $qCount     = document.getElementById('q-count');
const $pFill      = document.getElementById('progress-fill');
const $dot1       = document.getElementById('dot-1');
const $dot2       = document.getElementById('dot-2');
const $dot3       = document.getElementById('dot-3');
/* ============================================================
   API KEY MANAGEMENT
   ============================================================ */
function loadKey() {
  const saved = localStorage.getItem('edu_assist_gemini_key');
  if (saved) {
    GEMINI_API_KEY = saved;
    $modal.classList.remove('open');
    initAssistantMode();
  }
}
$saveKeyBtn.addEventListener('click', () => {
  const key = $apiInput.value.trim();
  if (!key || key.length < 10) {
    shake($apiInput);
    return;
  }
  GEMINI_API_KEY = key;
  localStorage.setItem('edu_assist_gemini_key', key);
  $modal.classList.remove('open');
  initAssistantMode();
});
$apiInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') $saveKeyBtn.click();
});
$resetKeyBtn.addEventListener('click', () => {
  localStorage.removeItem('edu_assist_gemini_key');
  GEMINI_API_KEY = null;
  $apiInput.value = '';
  $modal.classList.add('open');
});
function shake(el) {
  el.style.animation = 'none';
  el.getBoundingClientRect();
  el.style.animation = 'shake 0.4s ease';
  setTimeout(() => el.style.animation = '', 500);
}
/* ============================================================
   MODE SWITCHING
   ============================================================ */
$tabAssist.addEventListener('click', () => switchMode('assistant'));
$tabIntvw.addEventListener('click',  () => switchMode('interview'));
function switchMode(mode) {
  if (isWaiting) return;
  currentMode = mode;
  $tabAssist.classList.toggle('active', mode === 'assistant');
  $tabIntvw.classList.toggle('active',  mode === 'interview');
  // Reset interview state when switching
  if (mode === 'interview') {
    resetInterview();
    interviewState.active = false;
    clearMessages();
    showInterviewWelcome();
    $progress.classList.remove('visible');
  } else {
    clearMessages();
    initAssistantMode();
    $progress.classList.remove('visible');
  }
  $userInput.placeholder = mode === 'assistant'
    ? 'Ask about any college or admissions...'
    : 'Type your answer here...';
}
/* ============================================================
   ASSISTANT MODE INIT
   ============================================================ */
function initAssistantMode() {
  clearMessages();
  const colleges = Object.keys(collegeData);
  const chips = colleges.map(c =>
    `<span class="chip" tabindex="0" role="button" onclick="quickAsk('${c.replace(/'/g,"\\'")}')">📍 ${c}</span>`
  ).join('');
  const banner = `
    <div class="welcome-banner">
      <h2>👋 Welcome to Edu Assist!</h2>
      <p>I can answer your questions about <strong>14 new-generation colleges in India</strong> — fees, programs, scholarships, placements, and more. Click a college below or type your question!</p>
      <div class="college-chips">${chips}</div>
    </div>`;
  appendRaw(banner);
}
function quickAsk(college) {
  if (isWaiting) return;
  setInput(`Tell me about ${college}`);
  sendMessage();
}
/* ============================================================
   INTERVIEW MODE
   ============================================================ */
function showInterviewWelcome() {
  const banner = `
    <div class="interview-banner">
      <span class="ib-icon">🎤</span>
      <h2>Mock Interview Simulator</h2>
      <p>Practice for campus placements with AI-powered feedback. You'll answer 3 questions and receive a detailed score.</p>
      <div class="interview-rules">
        <div class="rule-item"><span class="rule-icon">📋</span><span>3 technical & HR questions</span></div>
        <div class="rule-item"><span class="rule-icon">💬</span><span>Instant feedback after each answer</span></div>
        <div class="rule-item"><span class="rule-icon">🏆</span><span>Final score out of 10 with summary</span></div>
      </div>
      <button class="start-interview-btn" id="start-interview-btn">
        <span>🚀</span> Start Interview
      </button>
    </div>`;
  appendRaw(banner);
  setTimeout(() => {
    const btn = document.getElementById('start-interview-btn');
    if (btn) btn.addEventListener('click', startInterview);
  }, 100);
}
function resetInterview() {
  interviewState = {
    active: false,
    questionIndex: 0,
    questions: [],
    answers: [],
    scores: []
  };
  updateProgressBar(0);
}
function startInterview() {
  if (isWaiting) return;
  clearMessages();
  interviewState.active = true;
  interviewState.questionIndex = 0;
  interviewState.answers = [];
  interviewState.scores = [];
  $progress.classList.add('visible');
  updateProgressBar(0);
  askInterviewQuestion(0);
}
async function askInterviewQuestion(idx) {
  const questionTypes = [
    'Ask a fundamental programming or CS concept question (e.g., about data structures, algorithms, OOP, time complexity, or basic programming logic). Keep it concise — one clear question.',
    'Ask a problem-solving or coding scenario question (e.g., describe a coding scenario or ask to explain an approach to solving a problem). Keep it concise — one clear question.',
    'Ask a behavioural / HR question suitable for campus placements (e.g., "Tell me about yourself", "Why should we hire you?", "Describe a challenge you faced"). Keep it concise — one clear question.'
  ];
  const systemPrompt = `You are a professional campus placement interviewer. 
Generate exactly ONE interview question of the following type: ${questionTypes[idx]}
Do NOT provide any answer or hints. Output only the question itself, no preamble.`;
  try {
    showTyping();
    const question = await callGemini([{ role: 'user', parts: [{ text: 'Generate the interview question now.' }] }], systemPrompt);
    removeTyping();
    interviewState.questions[idx] = question;
    updateProgressBar(idx);
    const meta = `<div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Question ${idx+1} of 3</div>`;
    appendMessage('bot', question + meta);
  } catch (err) {
    removeTyping();
    appendMessage('bot', `⚠️ Error generating question: ${err.message}. Please check your API key.`);
  }
}
async function submitInterviewAnswer(answer) {
  const idx = interviewState.questionIndex;
  interviewState.answers[idx] = answer;
  const systemPrompt = `You are a professional campus placement interviewer evaluating a candidate's answer.
Question asked: "${interviewState.questions[idx]}"
Candidate's answer: "${answer}"
Provide BRIEF feedback (under 3 sentences total) in this EXACT format:
✅ STRENGTH: [one specific strength of this answer]
💡 IMPROVE: [one specific improvement suggestion]
SCORE: [integer from 1 to 10]
Be honest, constructive, and specific. Output only the three lines above.`;
  try {
    showTyping();
    const feedback = await callGemini([{ role: 'user', parts: [{ text: 'Evaluate the answer now.' }] }], systemPrompt);
    removeTyping();
    // Parse feedback
    const strengthMatch = feedback.match(/✅\s*STRENGTH:\s*(.+)/i) || feedback.match(/STRENGTH:\s*(.+)/i);
    const improveMatch  = feedback.match(/💡\s*IMPROVE:\s*(.+)/i)  || feedback.match(/IMPROVE:\s*(.+)/i);
    const scoreMatch    = feedback.match(/SCORE:\s*(\d+)/i);
    const strength = strengthMatch ? strengthMatch[1].trim() : 'Good attempt';
    const improve  = improveMatch  ? improveMatch[1].trim()  : 'Keep practising';
    const score    = scoreMatch    ? parseInt(scoreMatch[1]) : 5;
    interviewState.scores[idx] = Math.min(10, Math.max(1, score));
    const feedbackHtml = `
      <strong>Feedback for Q${idx+1}:</strong>
      <div class="feedback-badges" style="margin-top:8px;">
        <span class="badge strength">✅ ${strength}</span>
        <span class="badge improve">💡 ${improve}</span>
      </div>`;
    appendMessage('bot', feedbackHtml);
    interviewState.questionIndex++;
    if (interviewState.questionIndex < 3) {
      setTimeout(() => askInterviewQuestion(interviewState.questionIndex), 800);
    } else {
      setTimeout(() => showFinalScore(), 800);
    }
  } catch (err) {
    removeTyping();
    appendMessage('bot', `⚠️ Error: ${err.message}`);
  }
}
async function showFinalScore() {
  updateProgressBar(3);
  const total = interviewState.scores.reduce((a,b) => a+b, 0);
  const avg = (total / 3).toFixed(1);
  const summaryPrompt = `You are a career coach. A student just completed a mock campus placement interview with 3 questions.
Scores per question: Q1=${interviewState.scores[0]}/10, Q2=${interviewState.scores[1]}/10, Q3=${interviewState.scores[2]}/10. Average: ${avg}/10.
Write a 2-sentence encouraging summary of their performance and one key tip to improve. Be warm and motivating.`;
  try {
    showTyping();
    const summary = await callGemini([{ role: 'user', parts: [{ text: 'Write the performance summary.' }] }], summaryPrompt);
    removeTyping();
    const grade = parseFloat(avg) >= 8 ? '🏆 Excellent' : parseFloat(avg) >= 6 ? '👍 Good' : parseFloat(avg) >= 4 ? '📈 Developing' : '💪 Keep Practising';
    const scoreHtml = `
      <strong>Interview Complete!</strong>
      <div class="score-card">
        <span class="score-number">${avg}</span>
        <span class="score-label">Average Score out of 10 &nbsp;·&nbsp; ${grade}</span>
        <div class="score-breakdown">
          <div class="score-row"><span class="s-key">Q1 – Programming/CS:</span><span class="s-val">${interviewState.scores[0]}/10</span></div>
          <div class="score-row"><span class="s-key">Q2 – Problem Solving:</span><span class="s-val">${interviewState.scores[1]}/10</span></div>
          <div class="score-row"><span class="s-key">Q3 – HR/Behavioural:</span><span class="s-val">${interviewState.scores[2]}/10</span></div>
        </div>
      </div>
      <div style="margin-top:12px;font-size:13px;color:var(--text-secondary);line-height:1.6;">${summary}</div>
      <div style="margin-top:14px;text-align:center;">
        <button class="start-interview-btn" onclick="switchMode('interview')">
          <span>🔄</span> Try Again
        </button>
      </div>`;
    appendMessage('bot', scoreHtml);
    $progress.classList.remove('visible');
    interviewState.active = false;
  } catch (err) {
    removeTyping();
    appendMessage('bot', `⚠️ Error generating summary: ${err.message}`);
  }
}
function updateProgressBar(completedQuestions) {
  const pct = (completedQuestions / 3) * 100;
  $pFill.style.width = pct + '%';
  const nextQ = Math.min(completedQuestions + 1, 3);
  $qCount.textContent = completedQuestions >= 3 ? 'Completed!' : `Question ${nextQ} of 3`;
  [$dot1, $dot2, $dot3].forEach((dot, i) => {
    dot.classList.remove('done','current');
    if (i < completedQuestions) dot.classList.add('done');
    else if (i === completedQuestions && completedQuestions < 3) dot.classList.add('current');
  });
}
/* ============================================================
   SEND MESSAGE HANDLER
   ============================================================ */
$sendBtn.addEventListener('click', sendMessage);
$userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
// Auto-resize textarea
$userInput.addEventListener('input', () => {
  $userInput.style.height = 'auto';
  $userInput.style.height = Math.min($userInput.scrollHeight, 120) + 'px';
});
function setInput(text) {
  $userInput.value = text;
  $userInput.style.height = 'auto';
}
async function sendMessage() {
  if (isWaiting || !GEMINI_API_KEY) return;
  const text = $userInput.value.trim();
  if (!text) return;
  appendMessage('user', escapeHtml(text));
  $userInput.value = '';
  $userInput.style.height = 'auto';
  if (currentMode === 'interview') {
    if (!interviewState.active) return;
    setWaiting(true);
    await submitInterviewAnswer(text);
    setWaiting(false);
  } else {
    setWaiting(true);
    await handleAssistantQuery(text);
    setWaiting(false);
  }
}
/* ============================================================
   ASSISTANT QUERY
   ============================================================ */
async function handleAssistantQuery(userText) {
  const systemPrompt = `You are Edu Assist, an expert college guide for students in India. 
You ONLY have information about these 14 new-generation colleges in India. Use ONLY the following JSON data to answer questions. Do not invent facts or reference any other colleges or institutions.
DATA:
${COLLEGE_JSON}
Rules:
1. Answer ONLY questions about the colleges in the data above.
2. If the answer is not in the data, say: "I don't have that specific information for this college."
3. If the question is about a college NOT in your database, say: "I only have information about the colleges listed above. Please ask about fee, location, placements, scholarships, or highlights."
4. Keep answers concise (2-4 sentences or a short bullet list).
5. Format numbers with ₹ symbol where appropriate.
6. Be warm, helpful, and encouraging to students.`;
  try {
    showTyping();
    const response = await callGemini([
      { role: 'user', parts: [{ text: userText }] }
    ], systemPrompt);
    removeTyping();
    appendMessage('bot', formatBotResponse(response));
  } catch (err) {
    removeTyping();
    let msg = `⚠️ <strong>API Error:</strong> ${escapeHtml(err.message)}`;
    if (err.message.includes('API_KEY') || err.message.includes('401') || err.message.includes('403')) {
      msg += '<br><br>Please check your API key and try resetting it using the "🔑 Reset Key" button.';
    } else if (err.message.includes('429') || err.message.includes('quota')) {
      msg += '<br><br>You\'ve hit the rate limit. Please wait a moment and try again.';
    }
    appendMessage('bot', msg);
  }
}
/* ============================================================
   GEMINI API CALL
   ============================================================ */
async function callGemini(contents, systemInstruction) {
  const model = 'gemini-2.0-flash';
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${GEMINI_API_KEY}`;
  
  const body = {
    contents,
    systemInstruction: { parts: [{ text: systemInstruction }] },
    generationConfig: {
      temperature: 0.7,
      maxOutputTokens: 512
    }
  };
  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!resp.ok) {
    const errBody = await resp.json().catch(() => ({}));
    const errMsg = errBody?.error?.message || `HTTP ${resp.status}`;
    throw new Error(errMsg);
  }
  const data = await resp.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error('Empty response from Gemini API');
  return text.trim();
}
/* ============================================================
   UI HELPERS
   ============================================================ */
function appendMessage(role, htmlContent) {
  const avatarClass = role === 'bot' ? 'bot' : 'user-av';
  const emoji = role === 'bot' ? '🤖' : '👤';
  const bubbleClass = role === 'bot' ? 'bot' : 'user';
  const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
  row.innerHTML = `
    <div class="avatar ${avatarClass}">${emoji}</div>
    <div>
      <div class="bubble ${bubbleClass}">${htmlContent}</div>
      <div class="msg-meta">${now}</div>
    </div>`;
  $messages.appendChild(row);
  scrollToBottom();
}
function appendRaw(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  $messages.appendChild(div);
  scrollToBottom();
}
function showTyping() {
  const el = document.createElement('div');
  el.className = 'typing-indicator';
  el.id = 'typing-indicator';
  el.innerHTML = `
    <div class="avatar bot">🤖</div>
    <div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
      <div class="typing-text">Edu Assist is thinking…</div>
    </div>`;
  $messages.appendChild(el);
  scrollToBottom();
}
function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}
function clearMessages() {
  $messages.innerHTML = '';
}
function scrollToBottom() {
  requestAnimationFrame(() => {
    $messages.scrollTop = $messages.scrollHeight;
  });
}
function setWaiting(v) {
  isWaiting = v;
  $sendBtn.disabled = v;
  $userInput.disabled = v;
  $tabAssist.style.pointerEvents = v ? 'none' : '';
  $tabIntvw.style.pointerEvents  = v ? 'none' : '';
}
function escapeHtml(str) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}
function formatBotResponse(text) {
  // Convert markdown-like syntax to HTML
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code style="background:rgba(108,99,255,0.15);padding:1px 6px;border-radius:4px;font-size:12px;">$1</code>')
    .replace(/^[-•]\s+(.+)$/gm, '• $1')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}
/* ============================================================
   SHAKE KEYFRAME (injected)
   ============================================================ */
(function injectShake() {
  const style = document.createElement('style');
  style.textContent = `@keyframes shake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)}
  }`;
  document.head.appendChild(style);
})();
/* ============================================================
   INIT
   ============================================================ */
loadKey();
</script>
