<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>EduAssist · Neo | AI College Guide</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ===================== RESET ===================== */
*{margin:0;padding:0;box-sizing:border-box;cursor:none;}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:#FAF7F0;color:#170E03;}

/* ===================== CURSOR ===================== */
#cur{position:fixed;width:12px;height:12px;border-radius:50%;background:#9A6428;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
#cur2{position:fixed;width:36px;height:36px;border-radius:50%;border:1.5px solid #7B4F1E;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);opacity:.5;}

/* ===================== LAYOUT ===================== */
.page{position:fixed;inset:0;display:flex;flex-direction:column;transition:.5s;z-index:2;}
.page.hidden{opacity:0;pointer-events:none;transform:translateY(16px);}

/* ===================== INTRO ===================== */
#intro{display:flex;align-items:center;justify-content:center;padding:30px;}
.intro-inner{display:grid;grid-template-columns:1fr 1fr;gap:40px;max-width:1100px;align-items:center;}

.intro-h1{font-family:'Playfair Display',serif;font-size:3rem;font-weight:900;}
.shimmer-text{color:#7B4F1E;}

.btn-cta{
background:linear-gradient(135deg,#7B4F1E,#9A6428);
border:none;color:white;padding:14px 30px;border-radius:50px;
font-weight:600;cursor:pointer;
}

/* ===================== CHAT ===================== */
nav{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:#fff;}
.tabs button{border:none;padding:8px 16px;border-radius:50px;cursor:pointer;background:#eee;}
.tabs .on{background:#7B4F1E;color:#fff;}

.chat-shell{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.msgs{flex:1;overflow-y:auto;padding:15px;}

.msg{display:flex;gap:10px;margin:10px 0;}
.msg.user{flex-direction:row-reverse;}
.bubble{padding:10px 14px;border-radius:16px;max-width:75%;}
.msg.user .bubble{background:#7B4F1E;color:#fff;}
.msg.bot .bubble{background:#fff;border:1px solid #ddd;}

.input-wrap{padding:10px;background:#fff;}
textarea{width:100%;padding:10px;border-radius:20px;border:1px solid #ccc;resize:none;}

.send{margin-top:8px;width:100%;padding:10px;border:none;background:#7B4F1E;color:#fff;border-radius:20px;cursor:pointer;}
</style>
</head>

<body>

<div id="cur"></div>
<div id="cur2"></div>

<!-- INTRO -->
<div class="page" id="intro">
  <div class="intro-inner">
    <div>
      <h1 class="intro-h1">AI Guide for<br><span class="shimmer-text">Scaler · NST · Vedam · NIAT</span></h1>
      <button class="btn-cta" onclick="goChat()">Launch</button>
    </div>
  </div>
</div>

<!-- CHAT -->
<div class="page hidden" id="chat">

<nav>
  <div><b>EduAssist</b></div>
  <div class="tabs">
    <button class="on" id="tabA" onclick="setMode('a')">Guide</button>
    <button id="tabI" onclick="setMode('i')">Interview</button>
  </div>
</nav>

<div class="chat-shell">
  <div class="msgs" id="msgs"></div>

  <div class="input-wrap">
    <textarea id="inp" placeholder="Ask anything..." onkeydown="hk(event)"></textarea>
    <button class="send" onclick="send()">Send</button>
  </div>
</div>

</div>

<script>

/* ===================== CURSOR ===================== */
const cur=document.getElementById('cur'),cur2=document.getElementById('cur2');
let mx=0,my=0,cx=0,cy=0;

document.addEventListener('mousemove',e=>{
mx=e.clientX;my=e.clientY;
cur.style.left=mx+'px';cur.style.top=my+'px';
});

(function anim(){
cx+=(mx-cx)*0.15;
cy+=(my-cy)*0.15;
cur2.style.left=cx+'px';
cur2.style.top=cy+'px';
requestAnimationFrame(anim);
})();

/* ===================== DATA ===================== */
const DATA={
"Scaler":{fee:28,short:"Scaler"},
"NST":{fee:23,short:"NST"},
"Vedam":{fee:18,short:"Vedam"},
"NIAT":{fee:4,short:"NIAT"}
};

const COLLEGES=Object.keys(DATA);

/* ===================== FIXED DETECTION ===================== */
function norm(s){return s.toLowerCase();}

function findCollege(q){
q=norm(q);
return COLLEGES.find(c=>q.includes(norm(c)) || q.includes(DATA[c].short.toLowerCase())) || null;
}

/* ===================== ANSWER ENGINE ===================== */
function answerQuery(q){

if(/hello|hi|hey/i.test(q))
return "Ask about Scaler, NST, Vedam, NIAT.";

if(/compare|vs/i.test(q)){
let found=COLLEGES.filter(c=>q.includes(norm(c)));
if(found.length>=2){
return `${found[0]} vs ${found[1]} comparison requested.`;
}
}

if(/cheapest|fee/i.test(q)){
return COLLEGES.sort((a,b)=>DATA[a].fee-DATA[b].fee)
.map(c=>`${c}: ₹${DATA[c].fee}L`).join("<br>");
}

if(/placement/i.test(q)){
return "Placements info available for all colleges.";
}

let c=findCollege(q);
if(c)return `${c} selected: fee ₹${DATA[c].fee}L`;

return "Ask about Scaler, NST, Vedam, NIAT.";
}

/* ===================== UI ===================== */
function addMsg(role,text){
const d=document.createElement('div');
d.className='msg '+role;
d.innerHTML=`<div class="bubble">${text}</div>`;
document.getElementById('msgs').appendChild(d);
}

function send(){
const inp=document.getElementById('inp');
const t=inp.value.trim();
if(!t)return;
inp.value="";
addMsg("user",t);
setTimeout(()=>addMsg("bot",answerQuery(t)),300);
}

function hk(e){if(e.key==="Enter"){e.preventDefault();send();}}

function setMode(m){
document.getElementById('tabA').classList.toggle('on',m==='a');
document.getElementById('tabI').classList.toggle('on',m==='i');
}

function goChat(){
document.getElementById('intro').classList.add('hidden');
document.getElementById('chat').classList.remove('hidden');
}

</script>

</body>
</html>
