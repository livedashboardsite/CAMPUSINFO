<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Edu Assist | Premium College AI</title>
<style>
/* ---------- RESET & PREMIUM THEME (LUXURY DARK / GOLD ACCENTS) ---------- */
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
:root {
--bg-primary: #0B0C10;
--bg-elevated: #13161F;
--bg-card: #1A1E2A;
--bg-glass: rgba(26, 30, 42, 0.65);
--accent-gold: #E4B363;
--accent-gold-glow: rgba(228, 179, 99, 0.2);
--accent-teal: #3B9E9C;
--text-primary: #F0F3F8;
--text-secondary: #A0A6B5;
--border-light: #2A2F3F;
--gradient-premium: linear-gradient(135deg, #E4B363, #C48B36);
--gradient-chat: linear-gradient(135deg, #252C3C, #1A1E2A);
--shadow-soft: 0 12px 28px rgba(0, 0, 0, 0.4);
--font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Poppins', sans-serif;
}
body {
background: var(--bg-primary);
font-family: var(--font-sans);
color: var(--text-primary);
height: 100vh;
overflow: hidden;
line-height: 1.5;
}
/* page transitions */
.page {
position: absolute;
inset: 0;
display: flex;
flex-direction: column;
transition: opacity 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1), visibility 0.4s;
}
.page.hidden {
opacity: 0;
visibility: hidden;
pointer-events: none;
}
/* ========== INTRO PAGE – PREMIUM LANDING ========== */
#intro {
background: radial-gradient(ellipse at 30% 40%, #11141E, #07090E);
justify-content: center;
align-items: center;
overflow-y: auto;
padding: 24px;
}
.intro-wrap {
display: grid;
grid-template-columns: 1fr 0.9fr;
max-width: 1280px;
width: 100%;
gap: 48px;
align-items: center;
backdrop-filter: blur(2px);
}
.intro-left {
display: flex;
flex-direction: column;
gap: 20px;
}
.badge-premium {
display: inline-flex;
align-items: center;
gap: 8px;
background: rgba(228, 179, 99, 0.12);
border: 1px solid rgba(228, 179, 99, 0.35);
border-radius: 60px;
padding: 6px 18px;
width: fit-content;
font-size: 0.75rem;
font-weight: 600;
letter-spacing: 0.4px;
color: var(--accent-gold);
}
.intro-h1 {
font-size: clamp(2rem, 4.5vw, 3.5rem);
font-weight: 800;
line-height: 1.2;
letter-spacing: -0.02em;
}
.gold-text {
background: linear-gradient(125deg, #F2C94C, #E4B363);
-webkit-background-clip: text;
background-clip: text;
color: transparent;
}
.intro-desc {
color: var(--text-secondary);
font-size: 1rem;
max-width: 520px;
line-height: 1.6;
}
.pill-group {
display: flex;
flex-wrap: wrap;
gap: 10px;
margin: 8px 0;
}
.pill-premium {
background: rgba(26, 30, 42, 0.8);
backdrop-filter: blur(4px);
border: 1px solid var(--border-light);
padding: 5px 14px;
border-radius: 40px;
font-size: 0.75rem;
font-weight: 500;
color: var(--text-secondary);
}
.btn-gold {
background: var(--gradient-premium);
border: none;
border-radius: 60px;
padding: 14px 34px;
width: fit-content;
font-weight: 700;
font-size: 1rem;
color: #0B0C10;
display: flex;
align-items: center;
gap: 10px;
cursor: pointer;
box-shadow: 0 10px 20px -5px rgba(228, 179, 99, 0.3);
transition: transform 0.2s, box-shadow 0.2s;
margin-top: 8px;
}
.btn-gold:hover {
transform: translateY(-3px);
box-shadow: 0 18px 30px -6px rgba(228, 179, 99, 0.4);
}
.stat-row-premium {
display: flex;
gap: 36px;
margin-top: 12px;
}
.stat .stat-number {
font-size: 1.8rem;
font-weight: 800;
color: var(--accent-gold);
}
/* robot illustration – refined */
.robot-premium {
position: relative;
width: 280px;
height: 340px;
margin: 0 auto;
animation: floatRobot 3.6s ease-in-out infinite;
}
@keyframes floatRobot {
0%, 100% { transform: translateY(0px); }
50% { transform: translateY(-12px); }
}
.robot-glow {
position: absolute;
width: 260px;
height: 260px;
background: radial-gradient(circle, rgba(228,179,99,0.25) 0%, transparent 70%);
border-radius: 50%;
left: 50%;
top: 50%;
transform: translate(-50%, -50%);
animation: pulsePremium 3s infinite;
}
@keyframes pulsePremium {
0%,100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
50% { opacity: 0.9; transform: translate(-50%, -50%) scale(1.08); }
}
.cap-brim { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 110px; height: 10px; background: var(--gradient-premium); border-radius: 6px; }
.cap-top { position: absolute; top: -4px; left: 50%; transform: translateX(-50%); width: 80px; height: 28px; background: linear-gradient(135deg, #D4AF37, #B8860B); border-radius: 10px 10px 0 0; }
.head { position: absolute; top: 38px; left: 50%; transform: translateX(-50%); width: 100px; height: 94px; background: var(--bg-card); border: 1.5px solid #3A3F55; border-radius: 24px; box-shadow: 0 6px 18px rgba(0,0,0,0.3); }
.face-screen { background: #0E111B; width: 72px; height: 48px; border-radius: 16px; position: absolute; top: 18px; left: 50%; transform: translateX(-50%); border: 1px solid var(--accent-gold); box-shadow: inset 0 0 8px #E4B36330; }
.eye { width: 12px; height: 12px; background: var(--accent-gold); border-radius: 50%; position: absolute; top: 12px; animation: blink 4s infinite; }
.eye.left { left: 14px; } .eye.right { right: 14px; }
.mouth { width: 32px; height: 3px; background: #3B9E9C; border-radius: 2px; position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); animation: talk 1.6s infinite; }
.body { position: absolute; top: 128px; left: 50%; transform: translateX(-50%); width: 110px; height: 100px; background: var(--bg-card); border: 1.5px solid var(--border-light); border-radius: 22px; }
.chest-screen { background: #0C0F18; width: 76px; height: 48px; border-radius: 12px; position: absolute; top: 12px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; justify-content: center; gap: 4px; }
.bar-premium { height: 4px; background: var(--accent-gold); width: 70%; margin: 0 auto; border-radius: 4px; opacity: 0.7; }
.arm { background: var(--bg-card); border: 1px solid var(--border-light); width: 22px; height: 68px; position: absolute; top: 138px; border-radius: 14px; }
.arm.left { left: calc(50% - 76px); transform-origin: top; animation: waveL 2.8s infinite; }
.arm.right { right: calc(50% - 76px); transform-origin: top; animation: waveR 2.8s infinite; }
.leg { background: var(--bg-card); border: 1px solid var(--border-light); width: 26px; height: 66px; position: absolute; top: 226px; border-radius: 14px; }
.leg.left { left: calc(50% - 38px); } .leg.right { right: calc(50% - 38px); }
.foot { background: var(--bg-card); border: 1px solid var(--border-light); width: 38px; height: 16px; border-radius: 12px; position: absolute; top: 290px; }
.foot.left { left: calc(50% - 44px); } .foot.right { right: calc(50% - 44px); }
@keyframes blink { 0%,94%,100% { transform: scaleY(1); } 96% { transform: scaleY(0.1); } }
@keyframes talk { 0%,100% { width: 28px; } 50% { width: 16px; } }
@keyframes waveL { 0%,100% { transform: rotate(-5deg); } 50% { transform: rotate(9deg); } }
@keyframes waveR { 0%,100% { transform: rotate(5deg); } 50% { transform: rotate(-9deg); } }
/* ========== CHAT PAGE – SCROLLABLE & PREMIUM ========== */
#chat {
background: var(--bg-primary);
height: 100%;
}
nav {
background: var(--bg-elevated);
border-bottom: 1px solid var(--border-light);
padding: 12px 24px;
display: flex;
justify-content: space-between;
align-items: center;
flex-shrink: 0;
}
.logo-premium {
display: flex;
align-items: center;
gap: 10px;
font-weight: 700;
cursor: pointer;
}
.logo-icon {
background: var(--gradient-premium);
width: 36px;
height: 36px;
border-radius: 14px;
display: flex;
align-items: center;
justify-content: center;
font-size: 1.2rem;
}
.mode-tabs-premium {
background: #10131D;
border-radius: 48px;
padding: 4px;
display: flex;
gap: 6px;
}
.tab-premium {
background: transparent;
border: none;
padding: 6px 20px;
border-radius: 48px;
color: var(--text-secondary);
font-weight: 600;
font-size: 0.8rem;
cursor: pointer;
transition: all 0.2s;
}
.tab-premium.on {
background: var(--gradient-premium);
color: #0B0C10;
box-shadow: 0 2px 8px rgba(228,179,99,0.3);
}
/* CHAT STRUCTURE : perfect scroll */
.chat-body {
flex: 1;
display: flex;
flex-direction: column;
min-height: 0;
overflow: hidden;
}
.chips-strip {
display: flex;
gap: 8px;
padding: 12px 20px;
overflow-x: auto;
background: rgba(19, 22, 31, 0.8);
backdrop-filter: blur(8px);
border-bottom: 1px solid var(--border-light);
flex-shrink: 0;
scrollbar-width: thin;
}
.chip, .qchip {
background: var(--bg-card);
border: 1px solid var(--border-light);
padding: 6px 14px;
border-radius: 40px;
font-size: 0.7rem;
font-weight: 500;
color: var(--text-secondary);
cursor: pointer;
white-space: nowrap;
transition: all 0.2s;
}
.chip:hover, .qchip:hover {
border-color: var(--accent-gold);
color: var(--accent-gold);
background: rgba(228, 179, 99, 0.08);
}
.ibar {
background: var(--bg-elevated);
padding: 10px 20px;
border-bottom: 1px solid var(--border-light);
display: none;
flex-shrink: 0;
}
.ibar.on {
display: block;
}
.track {
height: 5px;
background: #252C3C;
border-radius: 10px;
margin-top: 6px;
}
.fill {
height: 5px;
background: var(--gradient-premium);
border-radius: 10px;
width: 0%;
transition: width 0.3s ease;
}
/* Messages container — SCROLLABLE */
.msgs {
flex: 1;
overflow-y: auto;
padding: 20px 20px;
display: flex;
flex-direction: column;
gap: 18px;
scroll-behavior: smooth;
}
.msgs::-webkit-scrollbar {
width: 5px;
}
.msgs::-webkit-scrollbar-track {
background: var(--bg-elevated);
}
.msgs::-webkit-scrollbar-thumb {
background: var(--accent-gold);
border-radius: 10px;
}
.msg {
display: flex;
gap: 12px;
align-items: flex-start;
animation: fadeIn 0.25s ease;
}
.msg.u {
flex-direction: row-reverse;
}
@keyframes fadeIn {
from { opacity: 0; transform: translateY(6px); }
to { opacity: 1; transform: translateY(0); }
}
.avatar {
width: 36px;
height: 36px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
font-size: 1rem;
}
.avatar.bot { background: var(--gradient-premium); color: #0B0C10; }
.avatar.user { background: var(--bg-card); border: 1px solid var(--border-light); }
.bubble {
max-width: 78%;
padding: 12px 18px;
